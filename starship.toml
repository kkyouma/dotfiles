# ==========================================
# CONFIGURACIÓN GENERAL
# ==========================================
palette = "tokyo_night"
add_newline = true

# Lado Izquierdo: Limpio y enfocado en la navegación y Git
format = """
$directory\
$git_branch\
$git_state\
$git_status\
$aws\
$gcloud\
$azure\
$line_break\
$character"""

# Lado Derecho: Tecnologías, Infraestructura y Tiempo
right_format = """
$python\
$java\
$nodejs\
$rust\
$docker_context\
$kubernetes\
$terraform\
${custom.dbt}\
$cmd_duration\
"""

# ==========================================
# CORE & GIT
# ==========================================
[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

[directory]
style = "blue bold"
read_only = " 󰌾"
truncation_length = 3
truncate_to_repo = true

[git_branch]
symbol = " "
style = "purple"

[git_commit]
tag_symbol = '  '

[git_status]
style = "red"
conflicted = "🏳"
ahead = " "
behind = " "
diverged = "󰘖"
up_to_date = ""
untracked = "?"
stashed = "S"
modified = "!"
staged = "+"
renamed = "»"
deleted = "x"


[cmd_duration]
min_time = 2000
style = "dark_gray"
format = "[$duration]($style) "

# ==========================================
# DATA ENGINEERING & PROGRAMACIÓN
# ==========================================
[python]
style = "dark_blue"
symbol = ' '
# uv usa .venv por defecto, Starship lo detectará automáticamente como virtualenv
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'

[java]
symbol = "󰅶 "
style = "red"
format = "[$symbol($version )]($style)"

[nodejs]
symbol = " "
style = "green"
format = "[$symbol($version )]($style)"

[rust]
symbol = "󱘗 "
style = "orange"
format = "[$symbol($version )]($style)"

[custom.dbt]
disabled = false
when = "test -f dbt_project.yml"
command = "dbt --version | awk '{print $2}'"
symbol = "󱍿 "
style = "orange"
format = "[$symbol$output]($style) "

# ==========================================
# INFRAESTRUCTURA & CLOUD (DevOps / DataOps)
# ==========================================
[terraform]
symbol = "󱁢 "
style = "purple"
format = "[$symbol$workspace]($style) "

[aws]
symbol = "󰸏 "
style = "orange"
format = '[$symbol($profile )(\($region\) )]($style)'

[gcloud]
symbol = "󱇶 "
style = "dark_gray"
format = '[$symbol$account(@$domain)(\($region\))]($style) '

[azure]
symbol = "󰠅 "
style = "blue"
format = '[$symbol($subscription)]($style) '

[kubernetes]
symbol = "󱃾 "
style = "cyan"
format = '[$symbol$context( \($namespace\))]($style) '
disabled = false

[docker_context]
symbol = " "
style = "blue"
format = "[$symbol$context]($style) "

# ==========================================
# PALETA DE COLORES (Tokyo Night)
# ==========================================
[palettes.tokyo_night]
red = '#f7768e'
orange = '#ff9e64'
yellow = '#e0af68'
beige = '#cfc9c2'
green = '#9ece6a'
aqua = '#73daca'
light_cyan = '#b4f9f8'
cyan = '#2ac3de'
blue = '#7dcfff'
dark_blue = '#7aa2f7'
purple = '#bb9af7'
foreground = '#c0caf5'
light_gray = '#a9b1d6'
gray = '#9aa5ce'
dark_gray = '#565f89'
darker_gray = '#414868'
background = '#1a1b26'
